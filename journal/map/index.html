<script>
const ANNOTATIONS = [{"lat": 35.6717, "lng": 139.765, "title": "An atrium cat and a quiet staircase", "place": "Ginza, Tokyo", "url": "/journal/tokyo-ginza-interiors/", "thumb": "/journal/tokyo-ginza-interiors/cover.jpg"}, {"lat": 35.6717, "lng": 139.765, "title": "Ginza to Marunouchi, Sunday afternoon", "place": "Ginza, Tokyo", "url": "/journal/tokyo-ginza-marunouchi/", "thumb": "/journal/tokyo-ginza-marunouchi/cover.jpg"}, {"lat": 35.7101, "lng": 139.8107, "title": "Skytree from the bridge", "place": "Tokyo Skytree, from Asakusa", "url": "/journal/tokyo-skytree/", "thumb": "/journal/tokyo-skytree/cover.jpg"}, {"lat": 55.6864, "lng": 12.5934, "title": "Chairs as portraits", "place": "Designmuseum Danmark, Copenhagen", "url": "/journal/copenhagen-chairs/", "thumb": "/journal/copenhagen-chairs/cover.jpg"}, {"lat": 55.6726, "lng": 12.5733, "title": "Morning at the Glyptotek", "place": "Ny Carlsberg Glyptotek, Copenhagen", "url": "/journal/copenhagen-glyptotek/", "thumb": "/journal/copenhagen-glyptotek/cover.jpg"}, {"lat": 55.6797, "lng": 12.5912, "title": "Copenhagen, late evening", "place": "Nyhavn, Copenhagen", "url": "/journal/copenhagen-evening/", "thumb": "/journal/copenhagen-evening/cover.jpg"}, {"lat": 55.681, "lng": 12.595, "title": "Copenhagen harbor, evening", "place": "Christianshavn, Copenhagen", "url": "/journal/copenhagen-harbor/", "thumb": "/journal/copenhagen-harbor/cover.jpg"}, {"lat": 55.6133, "lng": 12.5757, "title": "Copenhagen, behind the street", "place": "Rundetårn, Copenhagen", "url": "/journal/copenhagen-passages/", "thumb": "/journal/copenhagen-passages/cover.jpg"}];
// MapKit JS self-initializes from the data-token below and calls this when ready.
function initMapKit() {
  const map = new mapkit.Map("map", { colorScheme: mapkit.Map.ColorSchemes.Dark });
  const anns = ANNOTATIONS.map(a => {
    const m = new mapkit.MarkerAnnotation(new mapkit.Coordinate(a.lat, a.lng), {
      title: a.title, color: "#C82E86", clusteringIdentifier: "post",
    });
    m.data = a;
    m.callout = {
      calloutElementForAnnotation: () => {
        const d = document.createElement("div");
        d.className = "cb";
        d.innerHTML =
          (a.thumb ? `<a href="${a.url}"><img src="${a.thumb}" alt="${a.title}" width="96" height="50"></a>` : "") +
          `<a href="${a.url}">${a.title}${a.place ? " · " + a.place : ""}</a>`;
        return d;
      },
    };
    return m;
  });
  map.addAnnotations(anns);
  if (anns.length) map.showItems(anns);
}
</script>
