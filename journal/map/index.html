// MapKit JS self-initializes from the data-token below and calls this when ready.
function calloutRow(a) {
  return (a.thumb ? `<a href="${a.url}"><img src="${a.thumb}" alt="${a.title}" width="96" height="50"></a>` : "") +
    `<a href="${a.url}">${a.title}${a.place ? " · " + a.place : ""}</a>`;
}
function initMapKit() {
  const map = new mapkit.Map("map", { colorScheme: mapkit.Map.ColorSchemes.Dark });
  // Numbered pins are cluster annotations; MapKit gives them no callout by
  // default, so give them one that lists every post underneath.
  map.annotationForCluster = cluster => {
    const members = cluster.memberAnnotations;
    const m = new mapkit.MarkerAnnotation(cluster.coordinate, {
      color: "#C82E86", title: `${members.length} photos`,
    });
    m.callout = {
      calloutElementForAnnotation: () => {
        const d = document.createElement("div");
        d.className = "cb cb-multi";
        members.forEach(member => {
          const row = document.createElement("div");
          row.className = "cb-row";
          row.innerHTML = calloutRow(member.data);
          d.appendChild(row);
        });
        return d;
      },
    };
    return m;
  };
  const anns = ANNOTATIONS.map(a => {
    const m = new mapkit.MarkerAnnotation(new mapkit.Coordinate(a.lat, a.lng), {
      title: a.title, color: "#C82E86", clusteringIdentifier: "post",
    });
    m.data = a;
    m.callout = {
      calloutElementForAnnotation: () => {
        const d = document.createElement("div");
        d.className = "cb";
        d.innerHTML = calloutRow(a);
        return d;
      },
    };
    return m;
  });
  map.addAnnotations(anns);
  if (anns.length) map.showItems(anns);
}
